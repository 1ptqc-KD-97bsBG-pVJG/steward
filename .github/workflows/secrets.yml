name: Repository Safety

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read

jobs:
  hygiene:
    name: Secret and hygiene checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run repository hygiene tests
        run: uv run --extra dev pytest tests/test_repo_hygiene.py

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" -o "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          gitleaks dir . \
            --config gitleaks.toml \
            --report-format sarif \
            --report-path results.sarif \
            --exit-code 2

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results-sarif
          path: results.sarif
          if-no-files-found: ignore
