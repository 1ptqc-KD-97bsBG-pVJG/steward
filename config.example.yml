config_version: 1

server:
  host: "127.0.0.1"
  port: 8000
  public_base_url: "https://steward.example.ts.net"

database:
  url: "sqlite+aiosqlite:///./var/steward.db"

upstream:
  base_url: "http://127.0.0.1:1234/v1"
  timeout_seconds: 120

models:
  allowed:
    - "qwen/qwen3-coder-next"
    - "qwen3.5-122b-a10b"
    - "zai-org/glm-4.7-flash"

queue:
  max_length: 64
  short_job_max_input_chars: 4000
  short_job_max_output_tokens: 1200

auth:
  owner_user_id: "owner"
  bootstrap_admin_enabled: true

battery:
  enabled: true
  minimum_percent: 25
  reject_when_unplugged: false

